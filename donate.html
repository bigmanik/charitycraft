<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations </title>
    <link rel="stylesheet" href="src/style.css">

</head>
<body class="bg-black font-body">
    

<button
  id="backBtn"
  class="fixed right-4 top-4
         md:right-6 md:top-1/2 md:-translate-y-1/2
         bg-purple-600 hover:bg-purple-700
         text-white
         w-10 h-10
         md:w-14 md:h-14
         rounded-full
         shadow-lg hover:shadow-xl
         flex items-center justify-center
         transition-all duration-200 ease-out
         focus:outline-none focus:ring-2 focus:ring-purple-400 focus:ring-offset-2
         z-50"
  aria-label="Go back"
>
  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-7 md:h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
  </svg>
</button>


 <section
    class="w-full max-w-md rounded-2xl border border-white/10 bg-[#111114] shadow-2xl shadow-black/40 p-8 sm:ml-20 lg:ml-100"
    aria-labelledby="donation-heading"
  >
    <!-- Eyebrow + heading -->
    <p class="text-[11px] tracking-[0.2em] text-gray-500 font-semibold uppercase mb-1">
      Support this project
    </p>
    <h1 id="donation-heading" class="text-2xl font-bold text-white mb-6">
      Make a Donation
    </h1>
 
    <!-- Payment method tabs -->
    <div
      id="method-tabs"
      role="tablist"
      aria-label="Donation method"
      class="grid grid-cols-3 gap-1 bg-white/[0.04] border border-white/5 rounded-full p-1 mb-6"
    >
      <button
        type="button"
        role="tab"
        data-method="btc"
        aria-selected="true"
        class="method-tab flex items-center justify-center gap-1.5 rounded-full py-2 text-sm font-semibold transition-colors"
      >
        <span aria-hidden="true">₿</span> BTC
      </button>
      <button
        type="button"
        role="tab"
        data-method="usdt"
        aria-selected="false"
        class="method-tab flex items-center justify-center gap-1.5 rounded-full py-2 text-sm font-semibold transition-colors"
      >
        <span aria-hidden="true">$</span> USDT
      </button>
      <!-- <button
        type="button"
        role="tab"
        data-method="cashapp"
        aria-selected="false"
        class="method-tab flex items-center justify-center gap-1.5 rounded-full py-2 text-sm font-semibold transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-3.5 h-3.5" aria-hidden="true">
          <rect x="5" y="2" width="14" height="20" rx="2"/>
          <line x1="12" y1="18" x2="12" y2="18.01"/>
        </svg>
        Cash App
      </button> -->
    </div>
 
    <!-- QR code -->
    <div class="rounded-xl bg-black border border-white/10 p-6 flex items-center justify-center mb-4">
      <canvas id="qr-canvas" width="220" height="220"></canvas>
    </div>
 
    <!-- Address / handle + copy -->
    <div class="flex items-center justify-between gap-3 rounded-lg bg-white/[0.04] border border-white/5 px-4 py-3 mb-6">
      <span id="address-display" class="font-mono text-sm text-gray-400 truncate"></span>
      <button
        type="button"
        id="copy-btn"
        class="flex items-center gap-1.5 text-sm text-gray-300 hover:text-white transition-colors shrink-0"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="copy-label">Copy</span>
      </button>
    </div>
 
    <!-- Steps -->
    <ol id="steps-list" class="space-y-3 mb-6 text-sm text-gray-300"></ol>
 
    <hr class="border-white/10 mb-4" />
 
    <p class="text-center text-xs text-indigo-300/70">
      All transactions are final and non-refundable.
    </p>
  </section>

<script type="module" src="src/donation.js"></script>
</body>
</html>
